<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="logo-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eccb6b"/>
      <stop offset="0.55" stop-color="#c79a3a"/>
      <stop offset="1" stop-color="#9c6e1c"/>
    </linearGradient>
  </defs>

  <!-- cream plate so the mark reads in a browser tab -->
  <rect x="3" y="3" width="94" height="94" rx="24" fill="#f7eedb"/>
  <rect x="3.5" y="3.5" width="93" height="93" rx="23.5" fill="none" stroke="#c79a3a" stroke-width="1.4" opacity="0.5"/>

  <!-- gilded page block -->
  <path d="M50 69 C 40 62, 26 59, 14 62 L14 67 C 26 64, 40 67, 50 74 C 60 67, 74 64, 86 67 L86 62 C 74 59, 60 62, 50 69 Z" fill="url(#logo-gold)"/>

  <!-- right page -->
  <path d="M50 40 C 62 33, 78 31, 86 35 L86 62 C 74 59, 60 62, 50 69 Z" fill="#fdfaf3" stroke="#2b2622" stroke-width="2.4" stroke-linejoin="round"/>
  <!-- left page -->
  <path d="M50 40 C 38 33, 22 31, 14 35 L14 62 C 26 59, 40 62, 50 69 Z" fill="#fdfaf3" stroke="#2b2622" stroke-width="2.4" stroke-linejoin="round"/>

  <!-- spine -->
  <path d="M50 40 L50 69" stroke="#2b2622" stroke-width="2.4" stroke-linecap="round"/>

  <!-- text lines -->
  <g stroke="#2b2622" stroke-width="1.3" stroke-linecap="round" opacity="0.5" fill="none">
    <path d="M43 46 C 34 42, 25 41, 18 43"/>
    <path d="M43 52 C 34 48, 25 47, 18 49"/>
    <path d="M43 57 C 34 53, 25 52, 18 54"/>
    <path d="M57 46 C 66 42, 75 41, 82 43"/>
    <path d="M57 52 C 66 48, 75 47, 82 49"/>
    <path d="M57 57 C 66 53, 75 52, 82 54"/>
  </g>
</svg>
