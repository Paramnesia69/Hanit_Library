name: Sync e-vrit library

# מסנכרן את הספרייה הדיגיטלית של חנית מ-e-vrit פעם ביום.
# כל ספר חדש שהיא קונה נוסף ל-books.json, וה-commit מפעיל פריסה אוטומטית ב-Vercel.

on:
  schedule:
    - cron: '0 4 * * *' # כל יום ב-04:00 UTC (~07:00 בישראל)
  workflow_dispatch: {} # אפשר גם להריץ ידנית מ-GitHub

permissions:
  contents: write

concurrency:
  group: sync-evrit
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps (for the Upstash push)
        run: npm ci

      - name: Sync library from e-vrit
        env:
          # אופציונלי: אפשר להגדיר Sid אחר דרך Variables של הריפו (ברירת מחדל: חנית)
          EVRIT_SID: ${{ vars.EVRIT_SID }}
        run: node scripts/sync-evrit-library.mjs

      - name: Enrich new books from their e-vrit product pages
        run: node scripts/enrich-evrit-products.mjs

      - name: Push new/updated books to Upstash (preserves user edits)
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: node scripts/push-evrit-to-upstash.mjs

      - name: Commit if the library changed
        run: |
          git add src/data/books.json src/data/evrit-products.cache.json
          if git diff --cached --quiet; then
            echo "אין שינוי בספרייה — לא נוצר commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "sync: update e-vrit library ($(date -u +%Y-%m-%d))"
          git push
